{% extends "base.html" %}
{% block title %}edit #{{ entry.id }} {{ entry.title }}{% endblock %}
{% block body %}
<div class="entry-edit-page">
  <p class="muted"><a href="/entries/{{ entry.id }}">← back to entry</a></p>
  <h2>editing <span class="type-chip">{{ entry.type }}</span> #{{ entry.id }}</h2>

  <form hx-post="/api/entries/{{ entry.id }}" hx-swap="none" class="edit-form">
    <label>title <input type="text" name="title" value="{{ entry.title }}" /></label>
    <label>summary <input type="text" name="summary" value="{{ entry.summary or '' }}" /></label>
    <label>tags (csv) <input type="text" name="tags" value="{{ entry.tags | join(', ') }}" /></label>
    <label>project <input type="text" name="project" value="{{ entry.project or '' }}" /></label>
    {% if entry.type == "project" %}
      <label>area <input type="text" name="area" value="{{ entry.area or '' }}" placeholder="e.g. dev-tools" /></label>
    {% endif %}
    {% if entry.type == "todo" %}
      <label>status
        <select name="status">
          {% for s in ("pending", "in-progress", "done") %}
            <option value="{{ s }}" {% if entry.status == s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </label>
    {% endif %}
    <label>body
      <textarea name="body" rows="20">{{ body }}</textarea>
    </label>
    <div class="actions">
      <button type="submit">save</button>
      <a class="cancel-link" href="/entries/{{ entry.id }}">cancel</a>
      <button type="button"
              hx-delete="/api/entries/{{ entry.id }}"
              hx-confirm="move this entry to trash?"
              hx-swap="none"
              class="danger">delete</button>
    </div>
  </form>
</div>
{% endblock %}
